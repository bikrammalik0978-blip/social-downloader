<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Elite Downloader Pro</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#020617,
#071330,
#0f172a
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow-x:hidden;

color:white;

}

.box{

width:100%;
max-width:470px;

background:
rgba(9,21,47,0.88);

backdrop-filter:blur(20px);

padding:35px;

border-radius:28px;

border:
1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 60px rgba(0,0,0,0.45);

text-align:center;

}

.logo{

font-size:55px;

margin-bottom:10px;

}

h1{

font-size:38px;

margin-bottom:10px;

}

.subtitle{

color:#94a3b8;

margin-bottom:25px;

font-size:15px;

}

.inputBox{

position:relative;

}

.inputIcon{

position:absolute;

left:18px;
top:19px;

opacity:0.7;

}

input,select{

width:100%;

padding:17px;

padding-left:50px;

margin-top:15px;

border:none;

outline:none;

border-radius:18px;

background:#16213d;

color:white;

font-size:16px;

}

select{

padding-left:17px;

}

button{

width:100%;

padding:17px;

margin-top:20px;

border:none;

border-radius:18px;

background:
linear-gradient(
90deg,
#2952e3,
#4f7cff
);

color:white;

font-size:19px;

font-weight:600;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

}

.thumb{

width:100%;

margin-top:20px;

border-radius:20px;

display:none;

object-fit:cover;

max-height:260px;

}

.title{

margin-top:15px;

font-size:20px;

line-height:32px;

font-weight:600;

}

.details{

margin-top:20px;

background:#16213d;

padding:18px;

border-radius:18px;

text-align:left;

display:none;

}

.details p{

margin-top:10px;

color:#cbd5e1;

font-size:14px;

line-height:24px;

}

.tags{

margin-top:15px;

display:flex;

flex-wrap:wrap;

gap:10px;

}

.tag{

padding:8px 14px;

background:#2952e3;

border-radius:30px;

font-size:12px;

}

.progress{

width:100%;

height:13px;

background:#16213d;

border-radius:30px;

overflow:hidden;

margin-top:20px;

display:none;

}

.bar{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#2952e3,
#4f7cff
);

transition:1s;

}

.status{

margin-top:15px;

color:#cbd5e1;

font-size:15px;

min-height:24px;

}

.footer{

margin-top:30px;

font-size:14px;

color:#94a3b8;

line-height:25px;

}

</style>

</head>

<body>

<div class="box">

<div class="logo">
⚡
</div>

<h1>Elite Downloader</h1>

<div class="subtitle">
Instagram • Facebook • YouTube • MP3
</div>

<div class="inputBox">

<div class="inputIcon">
🔗
</div>

<input
type="text"
id="url"
placeholder="Paste video URL">

</div>

<select id="quality">

<option value="1080">
1080p Full HD
</option>

<option value="720">
720p HD
</option>

<option value="480">
480p
</option>

<option value="mp3">
MP3 Audio
</option>

</select>

<button onclick="getInfo()">
Get Video
</button>

<div id="preview"
style="display:none;">

<img
id="thumb"
class="thumb"
crossorigin="anonymous"
referrerpolicy="no-referrer">

<h3
id="title"
class="title">
</h3>

</div>

<div
id="details"
class="details">

<p id="uploader"></p>

<p id="views"></p>

<p id="likes"></p>

<p id="duration"></p>

<p id="uploadDate"></p>

<p id="description"></p>

<div
id="tags"
class="tags">
</div>

</div>

<button
id="downloadBtn"
style="display:none;"
onclick="downloadVideo()">

Download Now

</button>

<div
class="progress"
id="progress">

<div
class="bar"
id="bar">
</div>

</div>

<div
class="status"
id="status">
</div>

<div class="footer">

<p>
Created by Elite
</p>

<p>
Powered by Elite Downloader Pro
</p>

</div>

</div>

<script>

async function getInfo(){

const url =
document.getElementById('url').value;

if(!url){

alert('Paste video URL');

return;

}

const status =
document.getElementById('status');

status.innerText =
'Fetching video info...';

try{

const response =
await fetch('/info',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({url})

});

const data =
await response.json();

if(data.success){

document.getElementById("preview")
.style.display = "block";

const thumb =
document.getElementById("thumb");

thumb.style.display = "block";

thumb.src =
data.thumbnail ||
'https://placehold.co/600x400/png?text=Preview';

thumb.onerror = function(){

this.src =
'https://placehold.co/600x400/png?text=Preview';

};

document.getElementById("title")
.innerText =
data.title || 'Video Ready';

document.getElementById("details")
.style.display = "block";

document.getElementById("uploader")
.innerHTML =
"👤 Uploader: " + data.uploader;

document.getElementById("views")
.innerHTML =
"👁 Views: " + data.views;

document.getElementById("likes")
.innerHTML =
"❤️ Likes: " + data.likes;

document.getElementById("duration")
.innerHTML =
"⏱ Duration: " + data.duration;

document.getElementById("uploadDate")
.innerHTML =
"📅 Upload Date: " + data.uploadDate;

document.getElementById("description")
.innerText =
data.description;

const tagsContainer =
document.getElementById("tags");

tagsContainer.innerHTML = '';

if(data.tags){

data.tags.slice(0,10).forEach(tag=>{

tagsContainer.innerHTML +=
`
<div class="tag">
#${tag}
</div>
`;

});

}

document.getElementById("downloadBtn")
.style.display = "block";

status.innerText =
'Ready to download';

}else{

status.innerText =
'Failed to fetch video';

}

}catch(err){

status.innerText =
'Server error';

}

}

async function downloadVideo(){

const url =
document.getElementById('url').value;

const quality =
document.getElementById('quality').value;

if(!url){

alert('Paste URL');

return;

}

document.getElementById("progress")
.style.display = "block";

const bar =
document.getElementById('bar');

const status =
document.getElementById('status');

bar.style.width = '0%';

status.innerText =
'Preparing download...';

let progress = 0;

const interval = setInterval(()=>{

progress += 10;

if(progress <= 90){

bar.style.width =
progress + '%';

status.innerText =
'Downloading... ' + progress + '%';

}

},700);

window.location.href =
`/download?url=${encodeURIComponent(url)}&quality=${quality}`;

setTimeout(()=>{

clearInterval(interval);

bar.style.width = '100%';

status.innerText =
'Download complete';

},8000);

}

</script>

</body>
</html>
